<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PicReview</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#222;min-height:100vh}
header{background:#1a73e8;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
header h1{font-size:1.2rem;flex:1;cursor:pointer}
#roleLabel{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:.85rem}
#logoutBtn{background:#fff;color:#1a73e8;border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:.85rem;font-weight:600}
main{padding:24px}
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.btn-back{background:#fff;border:2px solid #1a73e8;color:#1a73e8;border-radius:20px;padding:5px 16px;cursor:pointer;font-size:.9rem;font-weight:600}
.btn-back:hover{background:#e8f0fe}
.project-title{font-size:1.2rem;font-weight:700}
.projects-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.projects-header h2{font-size:1.1rem;font-weight:700}
.btn-new-folder{background:#1a73e8;color:#fff;border:none;border-radius:20px;padding:7px 20px;cursor:pointer;font-size:.9rem;font-weight:600}
.btn-new-folder:hover{background:#1558b0}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.folder-card{background:#fff;border-radius:12px;padding:20px 18px;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px}
.folder-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.15)}
.folder-card .folder-icon{font-size:2rem}
.folder-card .folder-name{font-weight:700;font-size:1rem;word-break:break-all}
.folder-card .folder-meta{font-size:.78rem;color:#888}
.folder-card .folder-stats{display:flex;gap:6px;flex-wrap:wrap}
.folder-card{position:relative}
.level-tag{position:absolute;top:12px;right:12px;border-radius:10px;padding:2px 9px;font-size:.72rem;font-weight:800;letter-spacing:.03em}
.level-L1{background:#f8d7da;color:#842029}
.level-L2{background:#ffe5d0;color:#7d3400}
.level-L3{background:#fff3cd;color:#856404}
.level-L4{background:#d1e7dd;color:#0f5132}
.level-L5{background:#cfe2ff;color:#084298}
.level-L6{background:#e2d9f3;color:#3d0a91}
.projects-search{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.projects-search input{flex:1;min-width:160px;padding:8px 14px;border:1px solid #ccc;border-radius:20px;font-size:.9rem;font-family:inherit}
.projects-search input:focus{outline:none;border-color:#1a73e8}
.level-btn{padding:5px 14px;border-radius:20px;font-size:.82rem;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s}
.level-btn.active{border-color:currentColor!important;opacity:1}
.level-btn:not(.active){opacity:.65}
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-bar button{padding:6px 18px;border:2px solid #ccc;background:#fff;border-radius:20px;cursor:pointer;font-size:.9rem;transition:all .15s}
.filter-bar button.active,.filter-bar button:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe}
#statsBar{margin-left:auto;font-size:.85rem;color:#666}
#uploadArea{border:2px dashed #1a73e8;border-radius:12px;padding:28px;text-align:center;margin-bottom:28px;background:#fff;cursor:pointer;transition:background .15s}
#uploadArea:hover{background:#e8f0fe}
#uploadArea p{color:#555;margin-top:8px;font-size:.9rem}
#fileInput{display:none}
#uploadProgress{margin-top:10px;height:8px;background:#e0e0e0;border-radius:4px;display:none}
#uploadProgress .bar{height:100%;background:#1a73e8;border-radius:4px;width:0;transition:width .15s}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card-wrap{position:relative}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.15)}
.card-wrap.select-mode .card{outline:2px solid transparent}
.card-wrap.selected .card{outline:3px solid #1a73e8}
.card-sel{display:none;position:absolute;top:8px;right:8px;z-index:8}
.card-wrap.select-mode .card-sel{display:block}
.card-sel input{width:18px;height:18px;cursor:pointer}
.claim-pin{position:absolute;top:8px;left:8px;z-index:7;background:#ff9800;color:#fff;padding:4px 10px;border-radius:10px;font-size:.72rem;font-weight:800;max-width:calc(100% - 48px);text-align:left;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.batch-bar{display:none;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:12px 14px;background:#fff;border-radius:12px;border:1px solid #dee2e6}
.batch-bar.visible{display:flex}
.batch-bar label{display:flex;align-items:center;gap:6px;font-size:.88rem;cursor:pointer}
.batch-bar button{padding:6px 16px;border-radius:20px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;background:#e9ecef}
.batch-bar button.primary{background:#1a73e8;color:#fff}
.batch-bar button.danger{background:#dc3545;color:#fff}
#batchCount{margin-left:auto;font-size:.85rem;color:#555}
.modal-claim-pin{position:absolute;top:10px;left:10px;z-index:15;background:#ff9800;color:#fff;padding:5px 12px;border-radius:10px;font-size:.8rem;font-weight:800;display:none;max-width:85%;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.modal-claim-pin.show{display:block}
.btn-claim{padding:8px 18px;background:#ff9800;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:700}
.btn-claim:hover{background:#f57c00}
.btn-claim-secondary{padding:8px 14px;background:#fff;color:#666;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:.85rem}
.card .info{padding:10px 12px}
.card .filename{font-size:.78rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;border-radius:12px;padding:2px 10px;font-size:.73rem;font-weight:700;margin-bottom:4px}
.badge-pending{background:#fff3cd;color:#856404}
.badge-approved{background:#d1e7dd;color:#0f5132}
.badge-rejected{background:#f8d7da;color:#842029}
.badge-claimed{background:#fff3e0;color:#e65100}
.card .reject-reason{font-size:.73rem;color:#842029;margin-top:4px;word-break:break-all}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
#modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;max-width:920px;width:100%;max-height:96vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-img-wrap{
  background:#111;border-radius:16px 16px 0 0;overflow:auto;display:flex;align-items:center;justify-content:center;position:relative;
  flex-shrink:0;min-height:0;padding:8px;box-sizing:border-box;
  max-height:min(82vh,calc(100dvh - 200px));
}
.modal-img-wrap img{
  max-width:100%;width:auto;height:auto;object-fit:contain;display:block;
  max-height:min(82vh,calc(100dvh - 200px));
}
.nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.85);border:none;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-btn:hover{background:#fff}
.nav-btn:disabled{opacity:.2;cursor:default}
#btnPrev{left:10px}#btnNext{right:10px}
#navCounter{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;border-radius:12px;padding:2px 12px;font-size:.8rem}
.modal-body{padding:18px 22px 22px}
.modal-body h3{margin-bottom:6px;font-size:1rem;word-break:break-all}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tag{padding:4px 12px;border:2px solid #ccc;border-radius:20px;cursor:pointer;font-size:.82rem;transition:all .15s;background:#fff}
.tag.selected{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8;font-weight:700}
.modal-body textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px;font-size:.88rem;resize:vertical;min-height:60px;font-family:inherit;margin-bottom:14px}
.modal-body textarea:focus{outline:none;border-color:#1a73e8}
.comments-list{margin-bottom:14px;max-height:140px;overflow-y:auto}
.comment-item{background:#f8f9fa;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.83rem}
.comment-item .meta{color:#888;font-size:.73rem;margin-bottom:3px}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-approve{padding:8px 22px;background:#198754;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.92rem;font-weight:700}
.btn-approve:hover{background:#157347}
.btn-reject{padding:8px 22px;background:#dc3545;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.92rem;font-weight:700}
.btn-reject:hover{background:#bb2d3b}
.btn-close{padding:8px 18px;background:#e9ecef;color:#333;border:none;border-radius:8px;cursor:pointer;font-size:.92rem}
.btn-close:hover{background:#dee2e6}
.btn-delete{padding:8px 18px;background:#fff;color:#dc3545;border:2px solid #dc3545;border-radius:8px;cursor:pointer;font-size:.92rem;margin-right:auto}
.btn-delete:hover{background:#f8d7da}
.replaceBtn{width:100%;margin-top:8px;padding:7px;background:#dc3545;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600}
.btn-rename{background:none;border:none;cursor:pointer;color:#aaa;font-size:.85rem;padding:0 4px;vertical-align:middle;line-height:1}
.btn-rename:hover{color:#1a73e8}
#emptyHint{text-align:center;color:#aaa;margin-top:60px;font-size:1rem}
#loginMask{position:fixed;inset:0;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.login-box h2{margin-bottom:6px;font-size:1.4rem;color:#1a73e8}
.login-box .sub{color:#666;margin-bottom:22px;font-size:.9rem}
.login-box input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 14px;font-size:1rem;margin-bottom:18px;font-family:inherit}
.login-box input:focus{outline:none;border-color:#1a73e8}
.role-pick{display:flex;gap:12px;margin-bottom:22px}
.role-card{flex:1;border:2px solid #e0e0e0;border-radius:14px;padding:18px 10px 14px;cursor:pointer;transition:all .2s;text-align:center;position:relative;background:#fafafa}
#cardUploader{border-color:#b3d4fb}
#cardUploader:hover{border-color:#1a73e8;background:#eef5ff;box-shadow:0 4px 16px rgba(26,115,232,.15);transform:translateY(-2px)}
#cardUploader.selected{border-color:#1a73e8;background:#e8f0fe;box-shadow:0 4px 16px rgba(26,115,232,.22);transform:translateY(-2px)}
#cardReviewer{border-color:#a3d9b8}
#cardReviewer:hover{border-color:#198754;background:#edf7f2;box-shadow:0 4px 16px rgba(25,135,84,.15);transform:translateY(-2px)}
#cardReviewer.selected{border-color:#198754;background:#d7f0e3;box-shadow:0 4px 16px rgba(25,135,84,.22);transform:translateY(-2px)}
.role-icon-wrap{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.5rem;transition:transform .2s}
#cardUploader .role-icon-wrap{background:#dbeafe}
#cardReviewer .role-icon-wrap{background:#d1fae5}
.role-card:hover .role-icon-wrap,.role-card.selected .role-icon-wrap{transform:scale(1.12)}
.role-card .name{font-weight:700;font-size:1rem;margin-bottom:4px}
#cardUploader .name{color:#1558b0}
#cardReviewer .name{color:#146c43}
.role-card .desc{font-size:.72rem;color:#999;line-height:1.5}
.role-check{position:absolute;top:9px;right:9px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;opacity:0;transition:opacity .15s}
#cardUploader.selected .role-check{opacity:1;background:#1a73e8;color:#fff}
#cardReviewer.selected .role-check{opacity:1;background:#198754;color:#fff}
.login-box button{width:100%;padding:10px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
.login-box button:hover{background:#1558b0}
.role-badge-uploader{background:#dbeafe;color:#1558b0;border-radius:12px;padding:2px 9px;font-size:.78rem;font-weight:700;margin-left:6px}
.role-badge-reviewer{background:#d1fae5;color:#146c43;border-radius:12px;padding:2px 9px;font-size:.78rem;font-weight:700;margin-left:6px}
</style>
</head>
<body>
<div id="loginMask">
  <div class="login-box">
    <h2>PicReview</h2>
    <p class="sub">请输入名字并选择本次任务</p>
    <input id="nameInput" type="text" placeholder="你的名字" maxlength="20"/>
    <div class="role-pick">
      <div class="role-card" id="cardUploader" data-role="uploader"><div class="role-check">✓</div><div class="role-icon-wrap">📤</div><div class="name">上传</div><div class="desc">上传 / 删除 / 替换</div></div>
      <div class="role-card" id="cardReviewer" data-role="reviewer"><div class="role-check">✓</div><div class="role-icon-wrap">🔍</div><div class="name">审核</div><div class="desc">通过 / 打回 / 评论</div></div>
    </div>
    <button id="enterBtn">进入</button>
  </div>
</div>
<header>
  <h1 id="headerTitle" title="返回文件夹列表">PicReview</h1>
  <span id="roleLabel"></span>
  <button id="logoutBtn">切换</button>
</header>
<main>
  <!-- 文件夹列表视图 -->
  <div id="projectsView">
    <div class="projects-header">
      <h2>📁 所有文件夹</h2>
      <button class="btn-new-folder" id="btnNewFolder">+ 新建文件夹</button>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>
  <!-- 图片视图 -->
  <div id="imagesView" style="display:none">
    <div class="back-bar">
      <button class="btn-back" id="btnBack">← 返回</button>
      <span class="project-title" id="projectTitle"></span>
    </div>
    <div class="projects-search" id="imgSearchBar">
      <input id="imgSearch" type="text" placeholder="搜索文件名…"/>
      <div id="levelBtns" style="display:none;display:contents">
        <button class="level-btn" style="background:#f8d7da;color:#842029" data-level="L1">L1</button>
        <button class="level-btn" style="background:#ffe5d0;color:#7d3400" data-level="L2">L2</button>
        <button class="level-btn" style="background:#fff3cd;color:#856404" data-level="L3">L3</button>
        <button class="level-btn" style="background:#d1e7dd;color:#0f5132" data-level="L4">L4</button>
        <button class="level-btn" style="background:#cfe2ff;color:#084298" data-level="L5">L5</button>
        <button class="level-btn" style="background:#e2d9f3;color:#3d0a91" data-level="L6">L6</button>
        <button class="level-btn" style="background:#e9ecef;color:#555" data-level="">全部</button>
      </div>
    </div>
    <div id="uploadArea">
      <div style="font-size:2.5rem">📤</div>
      <p><strong>点击或拖拽图片到此处上传</strong></p>
      <p>支持 JPG / PNG / WEBP，可多选批量上传</p>
      <input id="fileInput" type="file" accept="image/*" multiple/>
      <div id="uploadProgress"><div class="bar" id="progressBar"></div></div>
      <p id="uploadStatus" style="margin-top:6px;font-size:.85rem;color:#555"></p>
    </div>
    <div class="filter-bar">
      <button class="active" data-filter="all">全部</button>
      <button data-filter="pending">待审核</button>
      <button data-filter="approved">已通过</button>
      <button data-filter="claimed">已认领</button>
      <button data-filter="rejected">已打回</button>
      <span id="statsBar"></span>
    </div>
    <div class="batch-bar" id="batchBar">
      <label><input type="checkbox" id="chkSelectMode"/> 多选</label>
      <label><input type="checkbox" id="chkSelectAll"/> 全选当前列表</label>
      <button type="button" class="primary" id="btnBatchDownload">下载选中</button>
      <button type="button" class="danger" id="btnBatchDelete" style="display:none">删除选中</button>
      <span id="batchCount">已选 0 张</span>
    </div>
    <div id="grid"></div>
    <div id="emptyHint" style="display:none">暂无图片</div>
  </div>
</main>
<div id="modal">
  <div class="modal-box">
    <div class="modal-img-wrap">
      <div class="modal-claim-pin" id="modalClaimPin"></div>
      <button class="nav-btn" id="btnPrev">&#8592;</button>
      <img id="modalImg" src="" alt=""/>
      <button class="nav-btn" id="btnNext">&#8594;</button>
      <span id="navCounter"></span>
    </div>
    <div class="modal-body">
      <h3 id="modalFilename"></h3><button class="btn-rename" id="btnRename" title="改名" style="display:none">✏️</button>
      <p id="modalSentence" style="font-size:.85rem;color:#1a73e8;margin-bottom:6px;display:none"></p>
      <p id="modalUploader" style="font-size:.78rem;color:#888;margin-bottom:12px"></p>
      <div id="reviewerSection">
        <p style="font-size:.83rem;font-weight:600;margin-bottom:8px">添加标签（可多选）</p>
        <div class="tags">
          <span class="tag" data-tag="有描边">有描边</span>
          <span class="tag" data-tag="豆豆眼">豆豆眼</span>
          <span class="tag" data-tag="风格问题">风格问题</span>
          <span class="tag" data-tag="形象/场景问题">形象/场景问题</span>
          <span class="tag" data-tag="色彩/文字问题">色彩/文字问题</span>
        </div>
        <textarea id="commentInput" placeholder="写评论或打回原因（可选）"></textarea>
        <div style="margin-bottom:10px">
          <button type="button" class="btn-claim" id="btnClaim" style="display:none">我来改！</button>
          <button type="button" class="btn-claim-secondary" id="btnUnclaim" style="display:none;margin-left:8px">取消认领</button>
        </div>
      </div>
      <div id="commentsList" class="comments-list"></div>
      <div class="modal-actions">
        <button class="btn-delete" id="btnDelete">🗑 删除</button>
        <button class="btn-close" id="modalClose">关闭</button>
        <button class="btn-reject" id="btnReject">✗ 打回</button>
        <button class="btn-approve" id="btnApprove">✓ 通过</button>
      </div>
      <div id="replaceSection" style="display:none;margin-top:14px;border-top:1px solid #eee;padding-top:14px">
        <p style="font-size:.83rem;color:#842029;margin-bottom:8px">⚠ 此图已被打回，上传替换图片：</p>
        <input id="replaceInput" type="file" accept="image/*"/>
        <button class="replaceBtn" id="replaceBtn" style="margin-top:8px">上传替换图片</button>
        <p id="replaceStatus" style="font-size:.8rem;margin-top:6px"></p>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const SENTENCE_MAP={
  "40001":{kw:"天",s:"蓝蓝的天空飘着朵朵白云。"},
  "40002":{kw:"地",s:"我们在绿油油的草地上奔跑。"},

  "40005":{kw:"我",s:"我们要团结友爱，互相帮助。"},

  "40015":{kw:"耳",s:"小兔子竖起耳朵，好像在听悄悄话。"},
  "40016":{kw:"目",s:"老师的目光，像阳光一样温暖我。"},
  "40017":{kw:"手",s:"我用双手接住天上飘下来的小雪花。"},
  "40018":{kw:"足",s:"哥哥在操场上踢足球。"},

async function hashFile(file){const buf=await file.arrayBuffer();const h=await crypto.subtle.digest("SHA-256",buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");}
async function handleFiles(files){
  const imgs=files.filter(f=>f.type.startsWith("image/"));if(!imgs.length)return;
  uploadProgress.style.display="block";
  let done=0,skipped=0,replaced=0,inserted=0;const total=imgs.length;
  const pid=currentProjectId==="__uncat__"?null:currentProjectId;
  async function uploadOne(f){
    const hash=await hashFile(f);
    let qn=sb.from("images").select("id").eq("filename",f.name).limit(1);
    if(pid===null)qn=qn.is("project_id",null);else qn=qn.eq("project_id",pid);
    const{data:sameName}=await qn;
    if(sameName&&sameName.length){
      try{
        const j=await cldUpload(f);
        await sb.from("images").update({url:j.secure_url,storage_path:j.public_id,file_hash:hash,status:"pending",updated_at:new Date().toISOString(),uploader:currentUser,replaced_by:currentUser,reject_reason:"",tags:[],claimed_by:null,claimed_at:null}).eq("id",sameName[0].id);
        replaced++;
      }catch(err){console.error(err);}
      done++;progressBar.style.width=(done/total*100)+"%";
      uploadStatus.textContent="处理中 "+done+" / "+total+"（同名替换）";
      return;
    }
    const{data:byHash}=await sb.from("images").select("id,filename").eq("file_hash",hash).limit(1);
    if(byHash&&byHash.length){skipped++;done++;progressBar.style.width=(done/total*100)+"%";uploadStatus.textContent="跳过重复："+f.name;return;}
    try{
      const j=await cldUpload(f);
      await sb.from("images").insert({url:j.secure_url,storage_path:j.public_id,filename:f.name,file_hash:hash,uploader:currentUser,status:"pending",tags:[],comments:[],project_id:pid,created_at:new Date().toISOString(),updated_at:new Date().toISOString()});
      inserted++;
    }catch(err){console.error(err);uploadStatus.textContent="上传失败："+f.name+" "+err.message;}
    done++;progressBar.style.width=(done/total*100)+"%";uploadStatus.textContent="上传中 "+done+" / "+total;
  }
  for(let i=0;i<imgs.length;i+=4)await Promise.allSettled(imgs.slice(i,i+4).map(uploadOne));
  uploadStatus.textContent="完成：新上传 "+inserted+"，同名替换 "+replaced+(skipped>0?"，跳过重复 "+skipped:"");
  setTimeout(()=>{uploadProgress.style.display="none";progressBar.style.width="0";uploadStatus.textContent="";},4500);
  fileInput.value="";
}

function parseImgName(fn){
  const base=(fn||"").replace(/\.[^.]+$/,"");
  const parts=base.split("_");
  const lvM=parts[0]&&parts[0].match(/L(\d+)/i);
  const lv=lvM?parseInt(lvM[1]):99;
  const book=parts.length>=2?parts.slice(1,-1).join("_"):"";
  const scM=parts[parts.length-1]&&parts[parts.length-1].match(/(\d+)/);
  const scene=scM?parseInt(scM[1]):0;
  return{lv,book,scene};
}
function sortImages(docs){
  const isEng=currentProjectName&&currentProjectName.includes("英语绘本");
  if(isEng){
    return[...docs].sort((a,b)=>{
      const pa=parseImgName(a.filename),pb=parseImgName(b.filename);
      if(pa.lv!==pb.lv)return pa.lv-pb.lv;
      const bc=pa.book.localeCompare(pb.book,"en");
      if(bc!==0)return bc;
      return pa.scene-pb.scene;
    });
  }
  return[...docs].sort((a,b)=>(b.filename||"").localeCompare(a.filename||""));
}
async function loadImages(){

});
btnApprove.addEventListener("click",async()=>{if(currentDocId)await submitReview("approved","");});
btnReject.addEventListener("click",async()=>{if(!currentDocId)return;const reason=commentInput.value.trim();if(!reason&&!selectedTags.length){commentInput.style.border="2px solid red";commentInput.placeholder="打回时请填写原因或选择标签";return;}commentInput.style.border="";await submitReview("rejected",reason||selectedTags.join("、"));});
async function submitReview(status,rejectReason){
  const comment=commentInput.value.trim();const item=allDocs.find(d=>d.id===currentDocId);const nc=[...(item?.comments||[])];
  if(comment||selectedTags.length)nc.push({user:currentUser,text:comment,tags:[...selectedTags],time:new Date().toISOString(),action:status});
  await sb.from("images").update({status,reject_reason:status==="rejected"?rejectReason:"",tags:selectedTags,comments:nc,reviewed_by:currentUser,updated_at:new Date().toISOString()}).eq("id",currentDocId);
  closeModal();
}
btnDelete.addEventListener("click",async()=>{if(!currentDocId)return;if(!confirm("确定删除？"))return;await sb.from("images").delete().eq("id",currentDocId);closeModal();});
replaceBtn.addEventListener("click",async()=>{
  const f=replaceInput.files[0];if(!f){replaceStatus.textContent="请先选择文件";return;}
  replaceStatus.textContent="正在上传...";
  const hash=await hashFile(f);
  let j;try{j=await cldUpload(f);}catch(err){replaceStatus.textContent="失败："+err.message;return;}
  await sb.from("images").update({url:j.secure_url,storage_path:j.public_id,file_hash:hash,status:"pending",tags:[],updated_at:new Date().toISOString(),uploader:currentUser,replaced_by:currentUser,claimed_by:null,claimed_at:null}).eq("id",currentDocId);
  replaceStatus.textContent="替换成功！";replaceInput.value="";setTimeout(closeModal,1200);
});
btnRename.addEventListener("click",async()=>{
  if(!currentDocId||currentRole!=="uploader")return;
  const item=allDocs.find(d=>d.id===currentDocId);if(!item)return;
  const oldName=item.filename||"";
  const newName=(prompt("修改文件名：",oldName)||"").trim();
  if(!newName||newName===oldName)return;
  await sb.from("images").update({filename:newName,updated_at:new Date().toISOString()}).eq("id",currentDocId);
  item.filename=newName;
  loadItem(item);
});
function fmt(iso){if(!iso)return"";const d=new Date(iso);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
</script>
</body>
